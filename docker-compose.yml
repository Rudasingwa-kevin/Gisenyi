services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db.srfrzcdzdclpkcnzitbf.supabase.co:5432/postgres?schema=public
      DIRECT_URL: postgresql://postgres:${DB_PASSWORD}@db.srfrzcdzdclpkcnzitbf.supabase.co:5432/postgres?schema=public
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_STORAGE_BUCKET: gisenyi
      NODE_ENV: production

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
