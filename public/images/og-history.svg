<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#0F1D32"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#E8C84A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Timeline decoration -->
  <line x1="150" y1="100" x2="150" y2="530" stroke="#C9A84C" stroke-width="2" opacity="0.1"/>
  <circle cx="150" cy="150" r="8" fill="#C9A84C" opacity="0.2"/>
  <circle cx="150" cy="250" r="8" fill="#C9A84C" opacity="0.2"/>
  <circle cx="150" cy="350" r="8" fill="#C9A84C" opacity="0.2"/>
  <circle cx="150" cy="450" r="8" fill="#C9A84C" opacity="0.2"/>
  
  <!-- Historical building silhouette -->
  <rect x="800" y="250" width="250" height="200" fill="#C9A84C" opacity="0.03"/>
  <rect x="820" y="270" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  <rect x="900" y="270" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  <rect x="980" y="270" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  <rect x="820" y="370" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  <rect x="900" y="370" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  <rect x="980" y="370" width="60" height="80" fill="#C9A84C" opacity="0.05"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="150" r="150" fill="#C9A84C" opacity="0.03"/>
  <circle cx="200" cy="500" r="100" fill="#C9A84C" opacity="0.04"/>
  
  <!-- Book/scroll icon -->
  <g transform="translate(250, 180)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#C9A84C" opacity="0.15"/>
    <rect x="20" y="20" width="40" height="45" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <line x1="30" y1="30" x2="50" y2="30" stroke="#C9A84C" stroke-width="2"/>
    <line x1="30" y1="40" x2="50" y2="40" stroke="#C9A84C" stroke-width="2"/>
    <line x1="30" y1="50" x2="45" y2="50" stroke="#C9A84C" stroke-width="2"/>
  </g>
  
  <!-- Category badge -->
  <rect x="250" y="290" width="100" height="32" rx="16" fill="#C9A84C" opacity="0.15"/>
  <text x="300" y="311" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#C9A84C" text-anchor="middle" letter-spacing="2">HISTORY</text>
  
  <!-- Title -->
  <text x="250" y="380" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="url(#gold)">History of</text>
  <text x="250" y="445" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="url(#gold)">Gisenyi</text>
  
  <!-- Subtitle -->
  <text x="250" y="490" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" opacity="0.8">Heritage &amp; Legacy</text>
  
  <!-- Decorative line -->
  <rect x="250" y="515" width="150" height="2" fill="url(#gold)" opacity="0.5"/>
  
  <!-- URL -->
  <text x="250" y="555" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#C9A84C" opacity="0.7">gisenyi.top/history</text>
  
  <!-- Corner accents -->
  <path d="M30 30 L80 30 L80 35 L35 35 L35 80 L30 80 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M1170 30 L1120 30 L1120 35 L1165 35 L1165 80 L1170 80 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M30 600 L80 600 L80 595 L35 595 L35 550 L30 550 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M1170 600 L1120 600 L1120 595 L1165 595 L1165 550 L1170 550 Z" fill="#C9A84C" opacity="0.3"/>
