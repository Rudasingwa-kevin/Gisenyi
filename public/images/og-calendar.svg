<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#0F1D32"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#E8C84A"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Calendar grid -->
  <rect x="750" y="100" width="400" height="430" rx="16" fill="#C9A84C" opacity="0.03"/>
  <rect x="750" y="100" width="400" height="60" fill="#C9A84C" opacity="0.05"/>
  <line x1="850" y1="160" x2="850" y2="530" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="950" y1="160" x2="950" y2="530" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="1050" y1="160" x2="1050" y2="530" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="220" x2="1150" y2="220" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="280" x2="1150" y2="280" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="340" x2="1150" y2="340" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="400" x2="1150" y2="400" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  <line x1="750" y1="460" x2="1150" y2="460" stroke="#C9A84C" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Highlighted date -->
  <rect x="870" y="290" width="60" height="40" rx="8" fill="#C9A84C" opacity="0.2"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="180" fill="#C9A84C" opacity="0.03"/>
  <circle cx="1100" cy="500" r="120" fill="#C9A84C" opacity="0.04"/>
  
  <!-- Calendar icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#C9A84C" opacity="0.15"/>
    <rect x="15" y="20" width="50" height="45" rx="4" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <line x1="15" y1="35" x2="65" y2="35" stroke="#C9A84C" stroke-width="2"/>
    <line x1="30" y1="15" x2="30" y2="25" stroke="#C9A84C" stroke-width="2"/>
    <line x1="50" y1="15" x2="50" y2="25" stroke="#C9A84C" stroke-width="2"/>
    <text x="40" y="55" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#C9A84C" text-anchor="middle">24</text>
  </g>
  
  <!-- Category badge -->
  <rect x="80" y="290" width="100" height="32" rx="16" fill="#C9A84C" opacity="0.15"/>
  <text x="130" y="311" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#C9A84C" text-anchor="middle" letter-spacing="2">CALENDAR</text>
  
  <!-- Title -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="url(#gold)">Events</text>
  <text x="80" y="445" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="url(#gold)">Calendar</text>
  
  <!-- Subtitle -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#FFFFFF" opacity="0.8">What's Happening in Gisenyi</text>
  
  <!-- Decorative line -->
  <rect x="80" y="515" width="150" height="2" fill="url(#gold)" opacity="0.5"/>
  
  <!-- URL -->
  <text x="80" y="555" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#C9A84C" opacity="0.7">gisenyi.top/calendar</text>
  
  <!-- Corner accents -->
  <path d="M30 30 L80 30 L80 35 L35 35 L35 80 L30 80 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M1170 30 L1120 30 L1120 35 L1165 35 L1165 80 L1170 80 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M30 600 L80 600 L80 595 L35 595 L35 550 L30 550 Z" fill="#C9A84C" opacity="0.3"/>
  <path d="M1170 600 L1120 600 L1120 595 L1165 595 L1165 550 L1170 550 Z" fill="#C9A84C" opacity="0.3"/>
</svg>