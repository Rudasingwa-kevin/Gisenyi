name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gisenyi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gisenyi_test?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gisenyi_test?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm test

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Build frontend
        run: npm run build
